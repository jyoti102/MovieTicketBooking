server:
  port: 8080

spring:
  application:
    name: api-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:
        - id: admin-panel
          uri: lb://admin-panel
          predicates:
            - Path=/admin/**

        - id: booking-system
          uri: lb://booking-system
          predicates:
            - Path=/booking/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka