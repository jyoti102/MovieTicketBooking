server:
  port: 8083

spring:
  application:
    name: theatre-service

  datasource:
    url: jdbc:h2:mem:theatre-db
    driverClassName: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  h2:
    console:
      enabled: true
      path: /h2-console

  cloud:
    gateway:
      routes:

        - id: theatre-service
          uri: lb://theatre-service
          predicates:
            - Path=/theatres/**

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka